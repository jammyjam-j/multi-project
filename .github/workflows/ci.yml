name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test and container checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        # TODO: fix lint errors properly instead of ignoring — currently ignoring E501 (line length)
        run: |
          flake8 --max-line-length 100 --ignore E501,W503 .
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Prepare Compose environment
        run: |
          cp .env.example .env

      - name: Build Docker image
        run: |
          docker build -t ecommerce-lite-app .

      - name: Verify Docker Compose
        run: |
          docker compose config
